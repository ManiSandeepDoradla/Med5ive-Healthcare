<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 | Page Not Found</title>

  <style>
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden auto;
      overflow-x: hidden;
      overflow-y: scroll;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #b5179e 0%, #9a37b2 25%, #7e56c6 50%,#6376db 75%,#4895ef 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }

    .container {
      text-align: center;
      padding: 40px;
      max-width: 500px;
    }

    h1 {
      font-size: 8rem;
      font-weight: 700;
      letter-spacing: 5px;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 12px 28px;
      background: #ffffff;
      color: #764ba2;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    a:hover {
      background: #f1f1f1;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 5rem;
      }

      h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page not found</h2>
    <p>
      The page you’re looking for doesn’t exist or has been moved.
      Let’s get you back on track.
    </p>
    <a href="/" >Go Home</a>
  </div>

</body>
</html>
