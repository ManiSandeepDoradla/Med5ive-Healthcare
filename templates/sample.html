<style>
  .form-section { margin: 20px 0; }
  .form-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 240px; }

  /* Toggle switch base */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .toggle {
    --w: 56px;
    --h: 28px;
    position: relative;
    width: var(--w);
    height: var(--h);
  }
  .toggle input {
    appearance: none;
    -webkit-appearance: none;
    width: 0; height: 0;
    position: absolute;
    opacity: 0;
  }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: #cfd8dc;
    border-radius: var(--h);
    transition: background .25s ease;
  }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: calc(var(--h) - 6px);
    height: calc(var(--h) - 6px);
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 3px rgba(0,0,0,.25);
    transition: transform .25s ease;
  }
  .toggle input:checked + .toggle-track {
    background: #4caf50;
  }
  .toggle input:checked + .toggle-track + .toggle-thumb {
    transform: translateX(calc(var(--w) - var(--h)));
  }

  /* Helper text */
  .toggle-label {
    font-weight: 600;
    min-width: 140px;
  }
  .toggle-state {
    font-size: 0.95rem;
    color: #37474f;
  }

  /* Conditional section */
  .hidden { display: none; }
</style>

<script>
  const appointmentTypeToggle = document.getElementById('appointmentTypeToggle');
  const appointmentTypeText   = document.getElementById('appointmentTypeText');
  const appointmentTypeHidden = document.getElementById('appointmentType');

  const cabSection = document.getElementById('cabSection');
  const cabToggle  = document.getElementById('cabToggle');
  const cabText    = document.getElementById('cabText');
  const cabHidden  = document.getElementById('cabService');

  const timeSlot = document.getElementById('timeSlot');
  const selectedTime = document.getElementById('selectedTime');

  // Initialize states
  function initStates() {
    // Appointment type default: Online
    appointmentTypeToggle.checked = false;
    appointmentTypeText.textContent = 'Online';
    appointmentTypeHidden.value = 'online';
    cabSection.classList.add('hidden');

    // Cab default: No
    cabToggle.checked = false;
    cabText.textContent = 'No';
    cabHidden.value = 'No';
  }
  initStates();

  // Toggle: Appointment Type (unchecked=Online, checked=Offline)
  appointmentTypeToggle.addEventListener('change', () => {
    const isOffline = appointmentTypeToggle.checked;
    appointmentTypeText.textContent = isOffline ? 'Offline' : 'Online';
    appointmentTypeHidden.value = isOffline ? 'offline' : 'online';

    // Show cab section only for Offline
    cabSection.classList.toggle('hidden', !isOffline);

    // Reset cab toggle if switching back to Online
    if (!isOffline) {
      cabToggle.checked = false;
      cabText.textContent = 'No';
      cabHidden.value = 'No';
    }
  });

  // Toggle: Cab Service (unchecked=No, checked=Yes)
  cabToggle.addEventListener('change', () => {
    const needCab = cabToggle.checked;
    cabText.textContent = needCab ? 'Yes' : 'No';
    cabHidden.value = needCab ? 'Yes' : 'No';
  });

  // Keep hidden selectedTime in sync
  timeSlot.addEventListener('change', () => {
    selectedTime.value = timeSlot.value;
  });

  // Optional: On submit, ensure hidden selectedTime is set
  document.getElementById('bookingForm').addEventListener('submit', (e) => {
    if (!selectedTime.value) selectedTime.value = timeSlot.value || '';
  });
</script>
